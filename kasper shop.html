<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Manager Pro | DZD Inventory</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- jsPDF and AutoTable for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js">
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        card: '#1e1e1e',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Smooth transition for all elements */
        *, *::before, *::after {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-gray-50 text-gray-900 dark:bg-dark dark:text-gray-100">
    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white dark:bg-card p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-800">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">Store Manager <span class="text-primary">Pro</span></h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Inventory & Sales Tracker (Algerian Dinar)</p>
            </div>
            <div class="flex gap-3 items-center">
                <!-- Dark/Light toggle button -->
                <button onclick="toggleTheme()" id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition" aria-label="Toggle dark mode">
                    <!-- Sun icon (show in dark mode) -->
                    <svg id="icon-sun" class="w-5 h-5 hidden dark:block text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <!-- Moon icon (show in light mode) -->
                    <svg id="icon-moon" class="w-5 h-5 block dark:hidden text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <button onclick="generatePDF()" class="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Print Report
                </button>
                <button onclick="resetDatabase()" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
                    Reset Database
                </button>
            </div>
        </header>
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white dark:bg-card p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm">
                <h3 class="text-gray-500 dark:text-gray-400 font-medium">Inventory Value</h3>
                <p class="text-3xl font-bold mt-2 text-gray-900 dark:text-white" id="stat-inventory-value">0 DZD</p>
            </div>
            <div class="bg-white dark:bg-card p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm">
                <h3 class="text-gray-500 dark:text-gray-400 font-medium">Items Sold</h3>
                <p class="text-3xl font-bold mt-2 text-blue-500" id="stat-items-sold">0</p>
            </div>
            <div class="bg-white dark:bg-card p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm">
                <h3 class="text-gray-500 dark:text-gray-400 font-medium">Total Profit</h3>
                <p class="text-3xl font-bold mt-2 text-green-500" id="stat-total-profit">0 DZD</p>
            </div>
        </div>
        <!-- Controls: Filters & Search -->
        <div class="flex flex-col md:flex-row justify-between gap-4">
            <div class="flex overflow-x-auto hide-scroll gap-2 pb-2 md:pb-0" id="category-filters">
                <!-- Buttons injected by JS -->
            </div>
            <div class="relative w-full md:w-72">
                <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()"
                class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white px-4 py-2 rounded-lg focus:outline-none focus:border-primary placeholder-gray-400 dark:placeholder-gray-500">
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Add Product Form -->
            <div class="bg-white dark:bg-card p-6 rounded-xl border border-gray-200 dark:border-gray-800 h-fit lg:sticky lg:top-8 shadow-sm">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-200 dark:border-gray-700 pb-2 text-gray-900 dark:text-white">Add New Product</h2>
                <form id="add-product-form" onsubmit="addProduct(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Product Name</label>
                        <input type="text" id="prod-name" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Category</label>
                        <select id="prod-category" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                            <option value="Cosmetics">Cosmetics</option>
                            <option value="Perfumes">Perfumes</option>
                            <option value="Tobacco">Tobacco</option>
                            <option value="Drinks">Drinks</option>
                            <option value="Sweets">Sweets</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Price (DZD)</label>
                            <input type="number" id="prod-price" min="0" step="1" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Stock</label>
                            <input type="number" id="prod-stock" min="0" value="4" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-primary hover:bg-blue-600 text-white py-2 rounded-lg font-medium transition mt-2 shadow-sm">
                        Add to Inventory
                    </button>
                </form>
            </div>
            <!-- Products Grid -->
            <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4" id="products-grid">
                <!-- Products injected by JS -->
            </div>
        </div>
    </div>
    <script>
        // --- Theme Toggle ---
        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            setTheme(!isDark);
        }

        // Apply saved theme on load
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (saved === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                // default to system preference or light
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();

        // --- Data & State ---
        const CATEGORIES = ['All', 'Cosmetics', 'Perfumes', 'Tobacco', 'Drinks', 'Sweets'];
        let currentCategory = 'All';
        // Products identified from image
        let products = JSON.parse(localStorage.getItem('storeData_v1_en')) || [
            { id: 1, name: "Viola Shampoo (Orange)", category: "Cosmetics", price: 350, stock: 4, sold: 0 },
            { id: 2, name: "Viola Shampoo (Red)", category: "Cosmetics", price: 350, stock: 4, sold: 0 },
            { id: 3, name: "Venus Shampoo (White)", category: "Cosmetics", price: 300, stock: 4, sold: 0 },
            { id: 4, name: "Venus Hair Glow (Black)", category: "Cosmetics", price: 320, stock: 4, sold: 0 },
            { id: 5, name: "Lux Deodorant Spray", category: "Cosmetics", price: 400, stock: 4, sold: 0 },
            { id: 6, name: "Dolle Fresh Deodorant", category: "Cosmetics", price: 250, stock: 4, sold: 0 },
            { id: 7, name: "Exone Action Deodorant", category: "Cosmetics", price: 280, stock: 4, sold: 0 },
            { id: 8, name: "Cristal Butterfly Spray", category: "Cosmetics", price: 250, stock: 4, sold: 0 },
            { id: 9, name: "Flux Care Deodorant (Men)", category: "Cosmetics", price: 300, stock: 4, sold: 0 },
            { id: 10, name: "RNB Perfume Spray", category: "Cosmetics", price: 350, stock: 4, sold: 0 },
            { id: 11, name: "Lacoste Inspiration Spray", category: "Cosmetics", price: 300, stock: 4, sold: 0 },
            { id: 12, name: "Women Razors (Pink Pack)", category: "Cosmetics", price: 150, stock: 4, sold: 0 },
            { id: 13, name: "Dorco Razors (Yellow)", category: "Cosmetics", price: 150, stock: 4, sold: 0 }
        ];
        // --- Core Functions ---
        function saveToMemory() {
            localStorage.setItem('storeData_v1_en', JSON.stringify(products));
            updateUI();
        }
        function formatDZD(number) {
            return new Intl.NumberFormat('fr-DZ').format(number) + ' DZD';
        }
        // --- UI Rendering ---
        function updateUI() {
            renderCategories();
            renderStats();
            renderProducts();
        }
        function renderCategories() {
            const container = document.getElementById('category-filters');
            container.innerHTML = CATEGORIES.map(cat => `
                <button onclick="setCategory('${cat}')" 
                    class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${
                        currentCategory === cat 
                        ? 'bg-primary text-white' 
                        : 'bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-400 hover:bg-gray-300 dark:hover:bg-gray-700'
                    }">
                    ${cat}
                </button>
            `).join('');
        }
        function setCategory(cat) {
            currentCategory = cat;
            renderProducts();
            renderCategories();
        }
        function renderStats() {
            let invValue = 0;
            let itemsSold = 0;
            let totalProfit = 0;
            products.forEach(p => {
                invValue += (p.price * p.stock);
                itemsSold += (p.sold || 0);
                totalProfit += (p.price * (p.sold || 0));
            });
            document.getElementById('stat-inventory-value').innerText = formatDZD(invValue);
            document.getElementById('stat-items-sold').innerText = itemsSold;
            document.getElementById('stat-total-profit').innerText = formatDZD(totalProfit);
        }
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => {
                const matchCat = currentCategory === 'All' || p.category === currentCategory;
                const matchSearch = p.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-400 dark:text-gray-500 py-10">No products found.</div>`;
                return;
            }
            grid.innerHTML = filtered.map(p => `
                <div class="bg-white dark:bg-card border border-gray-200 dark:border-gray-800 rounded-xl p-5 flex flex-col justify-between hover:border-gray-300 dark:hover:border-gray-600 transition shadow-sm">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-semibold bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-2 py-1 rounded">${p.category}</span>
                            <button onclick="deleteProduct(${p.id})" class="text-gray-400 hover:text-red-500 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white truncate" title="${p.name}">${p.name}</h3>
                        <p class="text-primary font-bold text-xl my-1">${formatDZD(p.price)}</p>
                        <div class="flex justify-between text-sm mt-3 bg-gray-50 dark:bg-gray-900 p-2 rounded">
                            <span class="text-gray-600 dark:text-gray-400">Stock: <span class="${p.stock === 0 ? 'text-red-500 font-bold' : 'text-gray-900 dark:text-white'}">${p.stock}</span></span>
                            <span class="text-gray-600 dark:text-gray-400">Sold: <span class="text-green-500">${p.sold || 0}</span></span>
                        </div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="sellProduct(${p.id})" class="flex-1 bg-green-600 hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed text-white py-1.5 rounded transition font-medium" ${p.stock === 0 ? 'disabled' : ''}>
                            Sell
                        </button>
                        <input type="number" id="sell-qty-${p.id}" min="1" max="${p.stock}" value="1" 
                            class="w-16 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-center rounded text-gray-900 dark:text-white focus:outline-none" ${p.stock === 0 ? 'disabled' : ''}>
                    </div>
                </div>
            `).join('');
        }
        // --- Actions ---
        function filterProducts() {
            renderProducts();
        }
        function addProduct(e) {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const category = document.getElementById('prod-category').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const stock = parseInt(document.getElementById('prod-stock').value);
            const newProd = { id: Date.now(), name, category, price, stock, sold: 0 };
            products.push(newProd);
            saveToMemory();
            e.target.reset();
            document.getElementById('prod-stock').value = 4;
        }
        function sellProduct(id) {
            const qtyInput = document.getElementById(`sell-qty-${id}`);
            const qtyToSell = parseInt(qtyInput.value);
            const product = products.find(p => p.id === id);
            if (product && product.stock >= qtyToSell && qtyToSell > 0) {
                product.stock -= qtyToSell;
                product.sold = (product.sold || 0) + qtyToSell;
                saveToMemory();
            } else {
                alert("Invalid quantity or out of stock!");
            }
        }
        function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                products = products.filter(p => p.id !== id);
                saveToMemory();
            }
        }
        function resetDatabase() {
            if(confirm("WARNING: This will permanently delete all products and sales data. Continue?")) {
                products = [];
                saveToMemory();
            }
        }
        // --- PDF Generation ---
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.text("Store Inventory Report", 14, 22);
            doc.setFontSize(11);
            doc.setTextColor(100);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);
            let invValue = 0;
            let itemsSold = 0;
            let totalProfit = 0;
            const tableData = products.map(p => {
                const pValue = p.price * p.stock;
                const pProfit = p.price * (p.sold || 0);
                invValue += pValue;
                itemsSold += (p.sold || 0);
                totalProfit += pProfit;
                return [p.name, p.price + ' DZD', p.stock.toString(), (p.sold || 0).toString(), pProfit + ' DZD'];
            });
            doc.setFontSize(12);
            doc.setTextColor(0);
            doc.text(`Inventory Value (Available): ${invValue} DZD`, 14, 42);
            doc.text(`Total Items Sold: ${itemsSold}`, 14, 49);
            doc.text(`Total Accumulated Profit: ${totalProfit} DZD`, 14, 56);
            doc.autoTable({
                startY: 65,
                head: [['Product Name', 'Unit Price', 'In Stock', 'Items Sold', 'Item Profit']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [59, 130, 246] },
                styles: { fontSize: 10 },
                foot: [['', '', '', 'TOTAL PROFIT', totalProfit + ' DZD']],
                footStyles: { fillColor: [240, 240, 240], textColor: [0,0,0], fontStyle: 'bold' }
            });
            doc.save('Store_Report.pdf');
        }
        // --- Initialization ---
        updateUI();
    </script>
</body>
</html>
