<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjel Cosmetics - Store Management</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        },
                        accent: {
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        :root {
            --sidebar-width: 260px;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .sidebar {
            width: var(--sidebar-width);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .sidebar-mobile {
            transform: translateX(-100%);
        }
        .sidebar-mobile.open {
            transform: translateX(0);
        }
        @media (min-width: 1024px) {
            .sidebar-mobile {
                transform: translateX(0) !important;
            }
            .sidebar-overlay {
                display: none !important;
            }
        }
        .sidebar-overlay {
            z-index: 45;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
        .cart-scroll {
            max-height: calc(100vh - 380px);
            overflow-y: auto;
        }
        .product-grid-scroll {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }
        @media (max-width: 1023px) {
            .product-grid-scroll {
                max-height: 400px;
            }
            .cart-scroll {
                max-height: 300px;
            }
        }
        .modal-backdrop {
            z-index: 60;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
        }
        .modal-panel {
            z-index: 61;
            animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }
        .toast {
            animation: slideDown 0.3s ease-out, fadeOut 0.3s ease-out 2.5s forwards;
        }
        @keyframes slideDown {
            from {
                transform: translateY(-40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .category-badge-cosmetics {
            background: #fce7f3;
            color: #be185d;
        }
        .category-badge-perfumes {
            background: #ede9fe;
            color: #6b21a8;
        }
        .category-badge-drinks {
            background: #e0f2fe;
            color: #0369a1;
        }
        .category-badge-mobile {
            background: #d1fae5;
            color: #047857;
        }
        .operator-mobilis {
            background: #059669;
            color: white;
        }
        .operator-djezzy {
            background: #dc2626;
            color: white;
        }
        .operator-ooredoo {
            background: #d97706;
            color: white;
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

    <!-- Main Application Script -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // ──────────────────────────────────────
        // ICON COMPONENTS (Lucide-style inline SVGs)
        // ──────────────────────────────────────
        const Icons = {

                className={className}>
                    <path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>

                </svg>
            ),

                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"

            ),
            Plus: ({ size = 20, className = '' }) => (

            ),
            Edit: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            ),
            Trash2: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    <line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
                </svg>
            ),
            Search: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

            ),
            AlertTriangle: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>
                </svg>
            ),
            Menu: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            ),
            X: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            ),
            DollarSign: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>

            ),
            TrendingUp: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                </svg>
            ),
            CreditCard: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" x2="23" y1="10" y2="10"/>
                </svg>
            ),
            ChevronRight: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            ),
            Image: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            ),
            CheckCircle: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            ),
            Minus: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            ),
            Store: ({ size = 20, className = '' }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                    <path d="M3 9v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/>

        };

        // ──────────────────────────────────────
        // CONSTANTS
        // ──────────────────────────────────────
        const CATEGORIES = ['Cosmetics', 'Perfumes', 'Drinks', 'Mobile Credit'];
        const OPERATORS = ['Mobilis', 'Djezzy', 'Ooredoo'];
        const LOW_STOCK_THRESHOLD = 5;
        const TOPUP_PRESETS = [100, 200, 500, 1000, 2000];
        const CURRENCY = 'DZD';
        const STORAGE_KEYS = {
            products: 'adjel_cosmetics_products',
            sales: 'adjel_cosmetics_sales',
            mobileTransactions: 'adjel_cosmetics_mobile_tx',
        };

        const getCategoryColor = (category) => {
            const map = {
                'Cosmetics': 'category-badge-cosmetics',
                'Perfumes': 'category-badge-perfumes',
                'Drinks': 'category-badge-drinks',
                'Mobile Credit': 'category-badge-mobile',
            };
            return map[category] || 'bg-gray-100 text-gray-700';
        };

        const getOperatorStyle = (operator) => {
            const map = {
                'Mobilis': 'operator-mobilis',
                'Djezzy': 'operator-djezzy',
                'Ooredoo': 'operator-ooredoo',
            };
            return map[operator] || 'bg-gray-500 text-white';
        };

        const generateId = () => 'id_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-DZ', {
                style: 'currency',
                currency: 'DZD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0,
            }).format(amount).replace('DZD', '').trim() + ' DZD';
        };

        // ──────────────────────────────────────
        // DEFAULT PRODUCTS (for first-time setup)
        // ──────────────────────────────────────
        const DEFAULT_PRODUCTS = [
            { id: generateId(), name: 'Luxury Lipstick - Rouge', category: 'Cosmetics', price: 1200, stock: 25,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Facial Moisturizer 50ml', category: 'Cosmetics', price: 1800, stock: 4,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Eau de Parfum - Oud Wood', category: 'Perfumes', price: 4500, stock: 8,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Rose Water Toner', category: 'Cosmetics', price: 950, stock: 3, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Energy Drink Can', category: 'Drinks', price: 150, stock: 60, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Mineral Water 1.5L', category: 'Drinks', price: 50, stock: 120, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Mobilis Recharge 200 DZD', category: 'Mobile Credit', price: 200, stock: 15,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Djezzy Recharge 500 DZD', category: 'Mobile Credit', price: 500, stock: 10,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Perfume Gift Set', category: 'Perfumes', price: 6800, stock: 2, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Ooredoo Recharge 1000 DZD', category: 'Mobile Credit', price: 1000, stock: 6,
                imageUrl: '', lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Soft Drink Cola', category: 'Drinks', price: 100, stock: 45, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
            { id: generateId(), name: 'Nail Polish Set', category: 'Cosmetics', price: 2200, stock: 12, imageUrl: '',
                lowStockThreshold: LOW_STOCK_THRESHOLD },
        ];

        // ──────────────────────────────────────
        // HELPER: Load from LocalStorage
        // ──────────────────────────────────────
        const loadFromStorage = (key, fallback) => {
            try {
                const stored = localStorage.getItem(key);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) return parsed;
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', key, e);
            }
            return fallback;
        };

        const saveToStorage = (key, data) => {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.warn('Failed to save to localStorage:', key, e);
            }
        };

        // ──────────────────────────────────────
        // TOAST COMPONENT
        // ──────────────────────────────────────
        const Toast = ({ message, type = 'success', onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 2800);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ?
                'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-amber-500';
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠';

            return (
                <div className={`toast fixed top-4 right-4 z-[100] flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white font-medium ${bgColor}`}>
                    <span className="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">{icon}</span>
                    <span>{message}</span>
                    <button onClick={onClose} className="ml-2 hover:bg-white/20 rounded-full p-1 transition-colors">
                        <Icons.X size={16}/>
                    </button>
                </div>
            );
        };

        // ──────────────────────────────────────
        // MAIN APP COMPONENT
        // ──────────────────────────────────────
        const App = () => {
            // ─── STATE ────────────────────────
            const [products, setProducts] = useState(() => loadFromStorage(STORAGE_KEYS.products,
                DEFAULT_PRODUCTS));
            const [sales, setSales] = useState(() => loadFromStorage(STORAGE_KEYS.sales, []));
            const [mobileTransactions, setMobileTransactions] = useState(() => loadFromStorage(STORAGE_KEYS
                .mobileTransactions, []));
            const [activePage, setActivePage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [toast, setToast] = useState(null);

            // Inventory modal state
            const [showProductModal, setShowProductModal] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [productForm, setProductForm] = useState({
                name: '',
                category: 'Cosmetics',
                price: '',
                stock: '',
                imageUrl: '',
            });

            // POS state
            const [cart, setCart] = useState([]);
            const [posCategoryFilter, setPosCategoryFilter] = useState('All');
            const [posSearch, setPosSearch] = useState('');

            // Mobile Credit state
            const [mcOperator, setMcOperator] = useState('Mobilis');
            const [mcPhoneNumber, setMcPhoneNumber] = useState('');
            const [mcAmount, setMcAmount] = useState('');
            const [mcCustomAmount, setMcCustomAmount] = useState('');

            // Delete confirmation
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            // ─── PERSISTENCE ──────────────────
            useEffect(() => {
                saveToStorage(STORAGE_KEYS.products, products);
            }, [products]);

            useEffect(() => {
                saveToStorage(STORAGE_KEYS.sales, sales);
            }, [sales]);

            useEffect(() => {
                saveToStorage(STORAGE_KEYS.mobileTransactions, mobileTransactions);
            }, [mobileTransactions]);

            // ─── COMPUTED VALUES ──────────────
            const totalSales = useMemo(() => sales.reduce((sum, s) => sum + (s.total || 0), 0), [sales]);
            const totalProducts = products.length;
            const lowStockCount = useMemo(() => products.filter(p => p.stock <= (p.lowStockThreshold ||
                LOW_STOCK_THRESHOLD)).length, [products]);
            const cartTotal = useMemo(() => cart.reduce((sum, item) => sum + item.price * item.quantity, 0), [
                cart]);

            // ─── TOAST HELPER ─────────────────
            const showToast = useCallback((message, type = 'success') => {
                setToast({ message, type, id: Date.now() });
            }, []);

            // ─── INVENTORY CRUD ───────────────
            const openAddProduct = () => {
                setEditingProduct(null);
                setProductForm({ name: '', category: 'Cosmetics', price: '', stock: '', imageUrl: '' });
                setShowProductModal(true);
            };

            const openEditProduct = (product) => {
                setEditingProduct(product);
                setProductForm({
                    name: product.name,
                    category: product.category,
                    price: product.price.toString(),
                    stock: product.stock.toString(),
                    imageUrl: product.imageUrl || '',
                });
                setShowProductModal(true);
            };

            const handleSaveProduct = () => {
                const price = parseFloat(productForm.price);
                const stock = parseInt(productForm.stock, 10);

                if (!productForm.name.trim()) {
                    showToast('Product name is required.', 'error');
                    return;
                }
                if (isNaN(price) || price < 0) {
                    showToast('Please enter a valid price.', 'error');
                    return;
                }
                if (isNaN(stock) || stock < 0) {
                    showToast('Please enter a valid stock quantity.', 'error');
                    return;
                }

                const productData = {
                    id: editingProduct ? editingProduct.id : generateId(),
                    name: productForm.name.trim(),
                    category: productForm.category,
                    price: price,
                    stock: stock,
                    imageUrl: productForm.imageUrl.trim(),
                    lowStockThreshold: editingProduct ? editingProduct.lowStockThreshold :
                        LOW_STOCK_THRESHOLD,
                };

                if (editingProduct) {
                    setProducts(prev => prev.map(p => p.id === editingProduct.id ? productData : p));
                    showToast('Product updated successfully!');
                } else {
                    setProducts(prev => [...prev, productData]);
                    showToast('Product added successfully!');
                }

                setShowProductModal(false);
                setEditingProduct(null);
            };

            const handleDeleteProduct = (productId) => {
                const product = products.find(p => p.id === productId);
                if (product) {
                    setDeleteConfirm({
                        id: productId,
                        name: product.name,
                        onConfirm: () => {
                            setProducts(prev => prev.filter(p => p.id !== productId));
                            setCart(prev => prev.filter(item => item.id !== productId));
                            showToast('Product deleted.', 'info');
                            setDeleteConfirm(null);
                        },
                    });
                }
            };

            // ─── POS OPERATIONS ────────────────
            const addToCart = (product) => {
                if (product.stock <= 0) {
                    showToast('This product is out of stock.', 'error');
                    return;
                }
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        if (existing.quantity >= product.stock) {
                            showToast('Cannot add more than available stock.', 'error');
                            return prev;
                        }
                        return prev.map(item =>
                            item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
                showToast(`${product.name} added to cart.`);
            };

            const removeFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.id !== productId));
            };

            const updateCartQuantity = (productId, delta) => {
                setCart(prev => {
                    return prev.map(item => {
                        if (item.id !== productId) return item;
                        const newQty = item.quantity + delta;
                        if (newQty <= 0) return null;
                        if (newQty > item.stock) {
                            showToast('Cannot exceed available stock.', 'error');
                            return item;
                        }
                        return { ...item, quantity: newQty };
                    }).filter(Boolean);
                });
            };

            const handleCheckout = () => {
                if (cart.length === 0) {
                    showToast('Cart is empty. Add products first.', 'error');
                    return;
                }

                // Validate stock
                for (const item of cart) {
                    const currentProduct = products.find(p => p.id === item.id);
                    if (!currentProduct || currentProduct.stock < item.quantity) {
                        showToast(`Insufficient stock for "${item.name}". Please adjust.`, 'error');
                        return;
                    }
                }

                // Deduct inventory
                setProducts(prev =>
                    prev.map(p => {
                        const cartItem = cart.find(ci => ci.id === p.id);
                        if (cartItem) {
                            return { ...p, stock: p.stock - cartItem.quantity };
                        }
                        return p;
                    })
                );

                // Record sale
                const saleRecord = {
                    id: generateId(),
                    items: cart.map(item => ({
                        productId: item.id,
                        name: item.name,
                        category: item.category,
                        price: item.price,
                        quantity: item.quantity,
                        subtotal: item.price * item.quantity,
                    })),
                    total: cartTotal,
                    date: new Date().toISOString(),
                    type: 'pos',
                };
                setSales(prev => [saleRecord, ...prev]);

                showToast(`Sale completed! Total: ${formatCurrency(cartTotal)}`);
                setCart([]);
            };

            const clearCart = () => {
                if (cart.length > 0) {
                    setCart([]);
                    showToast('Cart cleared.', 'info');
                }
            };

            // ─── MOBILE CREDIT ────────────────
            const handleTopUp = () => {
                const amount = mcCustomAmount ? parseFloat(mcCustomAmount) : parseFloat(mcAmount);
                const phoneNumber = mcPhoneNumber.trim();

                if (!phoneNumber) {
                    showToast('Please enter a phone number.', 'error');
                    return;
                }
                if (!/^0[5-7]\d{8}$/.test(phoneNumber)) {
                    showToast('Please enter a valid Algerian phone number (e.g., 0555123456).', 'error');
                    return;
                }
                if (isNaN(amount) || amount <= 0) {
                    showToast('Please select or enter a valid amount.', 'error');
                    return;
                }

                // Record mobile transaction
                const txRecord = {
                    id: generateId(),
                    operator: mcOperator,
                    phoneNumber: phoneNumber,
                    amount: amount,
                    date: new Date().toISOString(),
                    type: 'mobile_topup',
                };
                setMobileTransactions(prev => [txRecord, ...prev]);

                // Also record as a sale
                const saleRecord = {
                    id: generateId(),
                    items: [{
                        productId: null,
                        name: `${mcOperator} Top-Up`,
                        category: 'Mobile Credit',
                        price: amount,
                        quantity: 1,
                        subtotal: amount,
                    }],
                    total: amount,
                    date: new Date().toISOString(),
                    type: 'mobile_topup',
                    phoneNumber: phoneNumber,
                    operator: mcOperator,
                };
                setSales(prev => [saleRecord, ...prev]);

                showToast(`Top-Up of ${formatCurrency(amount)} sent to ${phoneNumber} (${mcOperator})!`);
                setMcPhoneNumber('');
                setMcAmount('');
                setMcCustomAmount('');
            };

            // ─── FILTERED PRODUCTS FOR POS ────

                let filtered = products;
                if (posCategoryFilter !== 'All') {
                    filtered = filtered.filter(p => p.category === posCategoryFilter);

                                        {/* Filters */}
                                        <div className="flex flex-col sm:flex-row gap-3 mb-4">
                                            <div className="flex flex-wrap gap-1.5">
                                                <button
                                                onClick={() => setPosCategoryFilter('All')}
                                                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                                                    posCategoryFilter === 'All'
                                                    ? 'bg-brand-600 text-white shadow-md'
                                                    : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                                                }`}
                                                >All</button>
                                                {CATEGORIES.map(cat => (
                                                    <button
                                                    key={cat}
                                                    onClick={() => setPosCategoryFilter(cat)}
                                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                                                        posCategoryFilter === cat
                                                        ? 'bg-brand-600 text-white shadow-md'
                                                        : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                                                    }`}
                                                    >{cat}</button>
                                                ))}
                                            </div>
                                            <div className="relative flex-1 sm:max-w-xs">
                                                <Icons.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                                                <input
                                                type="text"
                                                placeholder="Search..."
                                                className="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm bg-white"
                                                value={posSearch}
                                                onChange={(e) => setPosSearch(e.target.value)}
                                                />
                                            </div>
                                        </div>

                                        {/* Product Grid */}
                                        <div className="product-grid-scroll bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                                            {filteredPosProducts.length === 0 ? (
                                                <div className="text-center py-12 text-slate-400">
                                                    <Icons.Package size={44} className="mx-auto mb-3 opacity-30"/>
                                                    <p>No products found.</p>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                                    {filteredPosProducts.map(product => (
                                                        <button
                                                        key={product.id}
                                                        onClick={() => addToCart(product)}
                                                        disabled={product.stock <= 0}
                                                        className={`relative text-left p-3 rounded-xl border transition-all duration-200 group ${
                                                            product.stock <= 0
                                                            ? 'opacity-50 cursor-not-allowed bg-slate-50 border-slate-200'
                                                            : 'bg-white border-slate-200 hover:border-brand-400 hover:shadow-lg hover:shadow-brand-100 active:scale-[0.97] cursor-pointer'
                                                        }`}
                                                        >
                                                            <div className="w-full aspect-square rounded-lg bg-slate-100 mb-2.5 flex items-center justify-center overflow-hidden border border-slate-200">
                                                                {product.imageUrl ? (
                                                                    <img src={product.imageUrl} alt={product.name} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}/>
                                                                ) : null}
                                                                <Icons.Image size={28} className="text-slate-400" style={{ display: product.imageUrl ? 'none' : 'block' }}/>
                                                            </div>
                                                            <p className="text-xs font-semibold text-slate-700 truncate leading-tight">{product.name}</p>
                                                            <p className="text-sm font-bold text-brand-700 mt-0.5">{formatCurrency(product.price)}</p>
                                                            <span className={`inline-block text-[10px] px-1.5 py-0.5 rounded-full font-semibold mt-1 ${getCategoryColor(product.category)}`}>
                                                                {product.category}
                                                            </span>
                                                            {product.stock <= LOW_STOCK_THRESHOLD && product.stock > 0 && (
                                                                <span className="absolute top-2 right-2 bg-amber-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">
                                                                    {product.stock}
                                                                </span>
                                                            )}
                                                            {product.stock <= 0 && (
                                                                <span className="absolute top-2 right-2 bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">
                                                                    Out
                                                                </span>
                                                            )}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Cart Panel */}
                                    <div className="w-full lg:w-96 flex-shrink-0">
                                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 sticky top-24">
                                            <div className="flex items-center justify-between mb-4">
                                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                    <Icons.ShoppingCart size={20} className="text-brand-600"/>
                                                    Cart
                                                    {cart.length > 0 && (
                                                        <span className="bg-accent-500 text-white text-xs px-2 py-0.5 rounded-full">{cart.length}</span>
                                                    )}
                                                </h3>
                                                {cart.length > 0 && (
                                                    <button
                                                    onClick={clearCart}
                                                    className="text-xs text-red-500 hover:text-red-700 font-medium transition-colors"
                                                    >Clear All</button>
                                                )}
                                            </div>

                                            {cart.length === 0 ? (
                                                <div className="text-center py-10 text-slate-400">
                                                    <Icons.ShoppingCart size={44} className="mx-auto mb-3 opacity-30"/>
                                                    <p className="text-sm">Cart is empty</p>
                                                    <p className="text-xs mt-1">Click products to add them</p>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="cart-scroll space-y-3 mb-4 pr-1">
                                                        {cart.map(item => (
                                                            <div key={item.id} className="flex items-center gap-3 p-3 rounded-xl bg-slate-50 border border-slate-100">
                                                                <div className="flex-1 min-w-0">
                                                                    <p className="text-sm font-semibold text-slate-700 truncate">{item.name}</p>
                                                                    <p className="text-xs text-slate-500">{formatCurrency(item.price)} each</p>
                                                                </div>
                                                                <div className="flex items-center gap-2 flex-shrink-0">
                                                                    <button
                                                                    onClick={() => updateCartQuantity(item.id, -1)}
                                                                    className="w-7 h-7 rounded-full bg-white border border-slate-300 flex items-center justify-center hover:bg-slate-100 transition-colors"
                                                                    >
                                                                        <Icons.Minus size={14}/>
                                                                    </button>
                                                                    <span className="w-7 text-center font-bold text-sm text-slate-800">{item.quantity}</span>
                                                                    <button
                                                                    onClick={() => updateCartQuantity(item.id, 1)}
                                                                    className="w-7 h-7 rounded-full bg-white border border-slate-300 flex items-center justify-center hover:bg-slate-100 transition-colors"
                                                                    >
                                                                        <Icons.Plus size={14}/>
                                                                    </button>
                                                                </div>
                                                                <button
                                                                onClick={() => removeFromCart(item.id)}
                                                                className="p-1.5 rounded-lg hover:bg-red-50 text-red-400 hover:text-red-600 transition-colors flex-shrink-0"
                                                                >
                                                                    <Icons.Trash2 size={16}/>
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <div className="border-t border-slate-200 pt-4 space-y-2">
                                                        <div className="flex justify-between text-sm text-slate-600">
                                                            <span>Subtotal</span>
                                                            <span className="font-semibold">{formatCurrency(cartTotal)}</span>
                                                        </div>
                                                        <div className="flex justify-between text-lg font-bold text-slate-800">
                                                            <span>Total</span>
                                                            <span className="text-brand-700">{formatCurrency(cartTotal)}</span>
                                                        </div>
                                                        <button
                                                        onClick={handleCheckout}
                                                        className="w-full py-3 bg-accent-500 hover:bg-accent-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-accent-500/30 hover:shadow-xl hover:shadow-accent-500/40 transition-all active:scale-[0.98] mt-3"
                                                        >
                                                            Checkout · {formatCurrency(cartTotal)}
                                                        </button>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ── MOBILE CREDIT ── */}
                            {activePage === 'mobile' && (
                                <div className="fade-in max-w-2xl mx-auto space-y-6">
                                    {/* Operator Selection */}
                                    <div>
                                        <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Select Operator</h3>
                                        <div className="grid grid-cols-3 gap-3">
                                            {OPERATORS.map(op => (
                                                <button
                                                key={op}
                                                onClick={() => setMcOperator(op)}
                                                className={`py-4 rounded-xl font-bold text-sm transition-all duration-200 border-2 ${
                                                    mcOperator === op
                                                    ? `${getOperatorStyle(op)} border-transparent shadow-xl scale-105`
                                                    : 'bg-white border-slate-200 text-slate-700 hover:border-slate-300 hover:shadow-md'
                                                }`}
                                                >
                                                    {op}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Phone Number */}
                                    <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                                        <div className="relative">
                                            <Icons.Smartphone size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                                            <input
                                            type="tel"
                                            placeholder="e.g., 0555123456"
                                            value={mcPhoneNumber}
                                            onChange={(e) => setMcPhoneNumber(e.target.value.replace(/\D/g, '').slice(0, 10))}
                                            className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm font-medium"
                                            />
                                        </div>
                                        <p className="text-xs text-slate-400 mt-1.5">Enter a 10-digit Algerian mobile number</p>
                                    </div>

                                    {/* Amount */}
                                    <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                        <label className="block text-sm font-semibold text-slate-700 mb-3">Top-Up Amount</label>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {TOPUP_PRESETS.map(amt => (
                                                <button
                                                key={amt}
                                                onClick={() => { setMcAmount(amt.toString()); setMcCustomAmount(''); }}
                                                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${
                                                    mcAmount === amt.toString() && !mcCustomAmount
                                                    ? 'bg-brand-600 text-white shadow-md'
                                                    : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                                }`}
                                                >
                                                    {amt} DZD
                                                </button>
                                            ))}
                                        </div>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-semibold text-sm">DZD</span>
                                            <input
                                            type="number"
                                            placeholder="Custom amount"
                                            value={mcCustomAmount}
                                            onChange={(e) => { setMcCustomAmount(e.target.value); setMcAmount(''); }}
                                            className="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm font-medium"
                                            min="0"
                                            />
                                        </div>
                                    </div>

                                    {/* Process Button */}
                                    <button
                                    onClick={handleTopUp}
                                    disabled={!mcPhoneNumber || (!mcAmount && !mcCustomAmount)}
                                    className={`w-full py-4 rounded-xl font-bold text-base transition-all duration-200 shadow-lg ${
                                        mcPhoneNumber && (mcAmount || mcCustomAmount)
                                        ? `${getOperatorStyle(mcOperator)} shadow-xl hover:shadow-2xl active:scale-[0.98] cursor-pointer`
                                        : 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none'
                                    }`}
                                    >
                                        <span className="flex items-center justify-center gap-2">
                                            <Icons.CreditCard size={20}/>
                                            Process Top-Up {mcAmount || mcCustomAmount ? `· ${formatCurrency(parseInt(mcAmount || mcCustomAmount || 0))}` : ''}
                                        </span>
                                    </button>

                                    {/* Recent Mobile Transactions */}
                                    {mobileTransactions.length > 0 && (
                                        <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                            <h3 className="text-lg font-bold text-slate-800 mb-4">Recent Top-Ups</h3>
                                            <div className="space-y-3 max-h-64 overflow-y-auto">
                                                {mobileTransactions.slice(0, 10).map(tx => (
                                                    <div key={tx.id} className="flex items-center justify-between py-2.5 border-b border-slate-100 last:border-0">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${getOperatorStyle(tx.operator)}`}>
                                                                <Icons.Smartphone size={16}/>
                                                            </div>
                                                            <div>
                                                                <p className="text-sm font-semibold text-slate-700">{tx.operator}</p>
                                                                <p className="text-xs text-slate-400">{tx.phoneNumber}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="font-bold text-slate-800 text-sm">{formatCurrency(tx.amount)}</p>
                                                            <p className="text-xs text-slate-400">
                                                                {new Date(tx.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                                            </p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                    </div>

                    {/* ── PRODUCT MODAL ── */}
                    {showProductModal && (
                        <>
                            <div className="modal-backdrop fixed inset-0" onClick={() => setShowProductModal(false)}/>
                            <div className="modal-panel fixed inset-0 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
                                    <div className="flex items-center justify-between mb-5">
                                        <h3 className="text-lg font-bold text-slate-800">
                                            {editingProduct ? 'Edit Product' : 'Add New Product'}
                                        </h3>
                                        <button
                                        onClick={() => setShowProductModal(false)}
                                        className="p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors"
                                        >
                                            <Icons.X size={20}/>
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        {/* Name */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Product Name *</label>
                                            <input
                                            type="text"
                                            placeholder="Enter product name"
                                            value={productForm.name}
                                            onChange={(e) => setProductForm(prev => ({ ...prev, name: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm"
                                            />
                                        </div>

                                        {/* Category */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Category *</label>
                                            <select
                                            value={productForm.category}
                                            onChange={(e) => setProductForm(prev => ({ ...prev, category: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm bg-white"
                                            >
                                                {CATEGORIES.map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </div>

                                        {/* Price */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Price (DZD) *</label>
                                            <input
                                            type="number"
                                            placeholder="0"
                                            value={productForm.price}
                                            onChange={(e) => setProductForm(prev => ({ ...prev, price: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm"
                                            min="0"
                                            step="1"
                                            />
                                        </div>

                                        {/* Stock */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Stock Quantity *</label>
                                            <input
                                            type="number"
                                            placeholder="0"
                                            value={productForm.stock}
                                            onChange={(e) => setProductForm(prev => ({ ...prev, stock: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm"
                                            min="0"
                                            step="1"
                                            />
                                        </div>

                                        {/* Image URL */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Image URL (optional)</label>
                                            <input
                                            type="url"
                                            placeholder="https://example.com/image.jpg"
                                            value={productForm.imageUrl}
                                            onChange={(e) => setProductForm(prev => ({ ...prev, imageUrl: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm"
                                            />
                                            {productForm.imageUrl && (
                                                <div className="mt-2 w-20 h-20 rounded-lg bg-slate-100 overflow-hidden border border-slate-200">
                                                    <img
                                                    src={productForm.imageUrl}
                                                    alt="Preview"
                                                    className="w-full h-full object-cover"
                                                    onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-3 mt-6">
                                        <button
                                        onClick={() => setShowProductModal(false)}
                                        className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors"
                                        >Cancel</button>
                                        <button
                                        onClick={handleSaveProduct}
                                        className="flex-1 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold text-sm shadow-md shadow-brand-500/20 transition-all active:scale-95"
                                        >{editingProduct ? 'Update' : 'Add'} Product</button>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* ── DELETE CONFIRMATION ── */}
                    {deleteConfirm && (
                        <>
                            <div className="modal-backdrop fixed inset-0" onClick={() => setDeleteConfirm(null)}/>
                            <div className="modal-panel fixed inset-0 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                                    <div className="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                                        <Icons.AlertTriangle size={28} className="text-red-500"/>
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2">Delete Product?</h3>
                                    <p className="text-sm text-slate-500 mb-1">Are you sure you want to delete</p>
                                    <p className="text-sm font-semibold text-slate-700 mb-6">"{deleteConfirm.name}"?</p>
                                    <p className="text-xs text-red-500 mb-4">This action cannot be undone.</p>
                                    <div className="flex gap-3">
                                        <button
                                        onClick={() => setDeleteConfirm(null)}
                                        className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors"
                                        >Cancel</button>
                                        <button
                                        onClick={deleteConfirm.onConfirm}
                                        className="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold text-sm shadow-md transition-all active:scale-95"
                                        >Delete</button>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* ── TOAST ── */}
                    {toast && (
                        <Toast
                        message={toast.message}
                        type={toast.type}
                        onClose={() => setToast(null)}
                        key={toast.id}
                        />
                    )}
                </div>
            );
        };

        // ──────────────────────────────────────
        // RENDER APP
        // ──────────────────────────────────────
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
